<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — You Lead Elite Group</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F7F6F3;--white:#fff;--ink:#1A1A1A;--muted:#6B6B6B;--border:#E2E0DA;--accent-light:#F0EFE9;--green:#2D6A4F;--green-light:#D8F3DC;--red:#C0392B;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--radius:12px;--radius-sm:8px;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.site-header{background:var(--ink);padding:1rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
.site-name{font-size:14px;font-weight:700;color:#fff;}.site-name span{font-size:11px;font-weight:400;color:#888;display:block;}
.admin-badge{font-family:var(--mono);font-size:10px;background:#ffffff18;color:#fff;padding:4px 10px;border-radius:20px;border:1px solid #ffffff22;}
.main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.card-title{font-size:18px;font-weight:700;margin-bottom:.35rem;letter-spacing:-.02em;}
.card-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:1.25rem;}
label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin-bottom:.4rem;}
input[type="text"],input[type="password"],textarea,select{width:100%;font-family:var(--font);font-size:15px;color:var(--ink);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;outline:none;transition:border-color .15s;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--ink);background:var(--white);}
textarea{resize:vertical;min-height:100px;line-height:1.6;}
.form-group{margin-bottom:1rem;}
.btn{width:100%;padding:.85rem 1rem;font-family:var(--font);font-size:15px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:opacity .15s;}
.btn-primary{background:var(--ink);color:#fff;}.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);margin-top:.5rem;}
.btn-small{font-size:12px;font-weight:600;padding:.35rem .85rem;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--ink);cursor:pointer;font-family:var(--font);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;}
.stat-num{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--ink);}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.tabs{display:flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;margin-bottom:1.25rem;}
.tab{flex:1;padding:.6rem .5rem;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--muted);font-family:var(--font);transition:all .15s;}
.tab.active{background:var(--ink);color:#fff;}
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.filter-row select{flex:1;min-width:120px;font-size:13px;padding:.5rem .75rem;}
.filter-row input{flex:2;min-width:160px;font-size:13px;padding:.5rem .75rem;}
.sub-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.75rem;overflow:hidden;}
.sub-card-header{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;border-bottom:1px solid var(--border);cursor:pointer;}
.sub-header-left{flex:1;}
.sub-student{font-size:14px;font-weight:700;color:var(--ink);}
.sub-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.sub-body{padding:1rem;display:none;}
.sub-body.open{display:block;}
.sub-q{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;}
.sub-answer{font-size:13px;color:var(--ink);line-height:1.8;background:var(--bg);padding:.75rem 1rem;border-radius:6px;word-break:break-word;}
.day-manage-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;margin-bottom:.75rem;}
.day-manage-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.day-manage-title{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);}
.day-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.day-open{background:var(--green-light);color:var(--green);}
.day-closed{background:var(--accent-light);color:var(--muted);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:.75rem 1.25rem;border-radius:20px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}.toast.error{background:var(--red);}
.spinner{width:16px;height:16px;border:2.5px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media print{.site-header,.tabs,.filter-row,.btn,.btn-small,#printBtn,#downloadBtn{display:none!important;}.sub-body{display:block!important;}.sub-card{break-inside:avoid;border:1px solid #ccc;}body{background:white;}}
@media(max-width:480px){.stats-row{grid-template-columns:repeat(3,1fr);gap:6px;}.stat-num{font-size:18px;}.filter-row{flex-direction:column;}.filter-row select,.filter-row input{width:100%;}}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="site-name">You Lead Elite Group<span>Admin Dashboard</span></div>
    <span class="admin-badge">Admin</span>
  </div>
</header>
<main class="main">
  <div class="screen active" id="screen-login" style="max-width:420px;margin:2rem auto;">
    <div class="card">
      <div class="card-title">Admin Login</div>
      <div class="card-sub">Enter your admin password to access the dashboard.</div>
      <div class="form-group">
        <label for="adminPass">Password</label>
        <input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()" />
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">Login →</button>
    </div>
  </div>
  <div class="screen" id="screen-admin">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statStudents">—</div><div class="stat-label">Students</div></div>
      <div class="stat-card"><div class="stat-num" id="statSubmissions">—</div><div class="stat-label">Submissions</div></div>
      <div class="stat-card"><div class="stat-num" id="statDaysOpen">—</div><div class="stat-label">Days Open</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('submissions',this)">Submissions</button>
      <button class="tab" onclick="switchTab('students',this)">Students</button>
      <button class="tab" onclick="switchTab('days',this)">Manage Days</button>
    </div>
    <div id="tab-submissions">
      <div class="filter-row">
        <select id="filterDay" onchange="applyFilters()">
          <option value="">All Days</option>
          <option value="1">Day 1</option><option value="2">Day 2</option><option value="3">Day 3</option><option value="4">Day 4</option>
          <option value="5">Day 5</option><option value="6">Day 6</option><option value="7">Day 7</option><option value="8">Day 8</option>
        </select>
        <input type="text" id="filterStudent" placeholder="Search by name..." oninput="applyFilters()" />
        <button class="btn-small" onclick="window.print()">🖨 Print</button>
        <button class="btn-small" onclick="downloadCSV()">⬇ CSV</button>
      </div>
      <div id="subsList"></div>
    </div>
    <div id="tab-students" style="display:none;"><div id="studentsList"></div></div>
    <div id="tab-days" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Set assignment questions and open/close each day for students.</p>
      <div id="daysList"></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://tjmlkrwdghifqtkjnwyj.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqbWxrcndkZ2hpZnF0a2pud3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjUxMTUsImV4cCI6MjA5MDgwMTExNX0.gCdH6XQmq3R0IDfen2ozl8ZNBq1-8BBE6XA0CjrSj70';
const ADMIN_PASSWORD='badafeez';
const { createClient }=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let allSubmissions=[],allStudents=[],allDays=[];
function adminLogin() {
  const pass=document.getElementById('adminPass').value;
  if(pass===ADMIN_PASSWORD){document.getElementById('screen-login').classList.remove('active');document.getElementById('screen-admin').classList.add('active');loadAll();}
  else toast('Wrong password','error');
}
async function loadAll() {
  const [subsRes,stuRes,daysRes]=await Promise.all([
    db.from('submissions').select('*').order('submitted_at',{ascending:false}),
    db.from('students').select('*').order('name'),
    db.from('days').select('*').order('day_number')
  ]);
  allSubmissions=subsRes.data||[];allStudents=stuRes.data||[];allDays=daysRes.data||[];
  document.getElementById('statStudents').textContent=allStudents.length;
  document.getElementById('statSubmissions').textContent=allSubmissions.length;
  document.getElementById('statDaysOpen').textContent=allDays.filter(d=>d.is_open).length;
  renderSubmissions(allSubmissions);renderStudents();renderDays();
}
function applyFilters() {
  const day=document.getElementById('filterDay').value;
  const name=document.getElementById('filterStudent').value.toLowerCase().trim();
  let f=allSubmissions;
  if(day) f=f.filter(s=>s.day_number==day);
  if(name) f=f.filter(s=>s.student_name.toLowerCase().includes(name));
  renderSubmissions(f);
}
function escapeHtml(str){return(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatAnswer(str){return escapeHtml(str).replace(/\n\n/g,'</p><p style="margin-top:.6em;">').replace(/\n/g,'<br>');}
function renderSubmissions(subs) {
  const el=document.getElementById('subsList');
  if(!subs.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:14px;">No submissions found.</div>';return;}
  el.innerHTML=subs.map((s,i)=>{
    const date=new Date(s.submitted_at).toLocaleString('en-NG',{dateStyle:'medium',timeStyle:'short'});
    const dayConfig=allDays.find(d=>d.day_number===s.day_number);
    const question=escapeHtml(dayConfig?.question||'—');
    const answer=formatAnswer(s.answer);
    return `<div class="sub-card">
      <div class="sub-card-header" onclick="toggleSub(${i})">
        <div class="sub-header-left"><div class="sub-student">${escapeHtml(s.student_name)}</div><div class="sub-meta">Day ${s.day_number} &bull; ${date}</div></div>
        <span style="color:var(--muted);font-size:18px;" id="chevron-${i}">›</span>
      </div>
      <div class="sub-body" id="sub-body-${i}">
        <div class="sub-q">Question</div><div class="sub-answer" style="margin-bottom:.75rem;">${question}</div>
        <div class="sub-q">Student's Answer</div><div class="sub-answer"><p>${answer}</p></div>
      </div></div>`;
  }).join('');
}
function toggleSub(i) {
  const body=document.getElementById('sub-body-'+i);
  const chev=document.getElementById('chevron-'+i);
  body.classList.toggle('open');
  chev.textContent=body.classList.contains('open')?'˅':'›';
}
function renderStudents() {
  const el=document.getElementById('studentsList');
  if(!allStudents.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);">No students yet.</div>';return;}
  el.innerHTML=allStudents.map(s=>{
    const count=allSubmissions.filter(sub=>sub.student_id===s.id).length;
    const joined=new Date(s.created_at).toLocaleDateString('en-NG',{dateStyle:'medium'});
    return `<div class="sub-card"><div class="sub-card-header" style="cursor:default;">
      <div class="sub-header-left"><div class="sub-student">${s.name}</div><div class="sub-meta">Joined ${joined} &bull; ${count} submission${count!==1?'s':''}</div></div>
      <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--green-light);color:var(--green);">${count}/8</span>
    </div></div>`;
  }).join('');
}
function renderDays() {
  const el=document.getElementById('daysList');
  let html='';
  for(let i=1;i<=8;i++){
    const day=allDays.find(d=>d.day_number===i);
    const isOpen=day?.is_open||false;
    const question=day?.question||'';
    const subCount=allSubmissions.filter(s=>s.day_number===i).length;
    html+=`<div class="day-manage-card">
      <div class="day-manage-header">
        <span class="day-manage-title">Day ${i}</span>
        <div style="display:flex;gap:.5rem;align-items:center;">
          <span class="day-status ${isOpen?'day-open':'day-closed'}">${isOpen?'Open':'Closed'}</span>
          <span style="font-size:11px;color:var(--muted);">${subCount} submitted</span>
        </div>
      </div>
      <div class="form-group"><label>Assignment Question</label><textarea id="q-day-${i}" placeholder="Type the question for Day ${i}...">${question}</textarea></div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <button class="btn btn-primary" style="width:auto;padding:.6rem 1.25rem;font-size:13px;" onclick="saveDay(${i})">Save</button>
        <button class="btn" style="width:auto;padding:.6rem 1.25rem;font-size:13px;background:${isOpen?'transparent':'var(--green)'};color:${isOpen?'var(--muted)':'#fff'};border:1.5px solid ${isOpen?'var(--border)':'var(--green)'};" onclick="toggleDay(${i},${!isOpen})">${isOpen?'Close Day':'Open Day'}</button>
      </div></div>`;
  }
  el.innerHTML=html;
}
async function saveDay(dayNum) {
  const question=document.getElementById('q-day-'+dayNum).value.trim();
  if(!question){toast('Please enter a question first','error');return;}
  const existing=allDays.find(d=>d.day_number===dayNum);
  let error;
  if(existing){({error}=await db.from('days').update({question}).eq('day_number',dayNum));}
  else{({error}=await db.from('days').insert({day_number:dayNum,question,is_open:false}));}
  if(error){toast('Save failed: '+error.message,'error');return;}
  toast('Day '+dayNum+' saved!','success');
  await loadAll();
}
async function toggleDay(dayNum,openState) {
  const existing=allDays.find(d=>d.day_number===dayNum);
  let error;
  if(existing){({error}=await db.from('days').update({is_open:openState}).eq('day_number',dayNum));}
  else{const q=document.getElementById('q-day-'+dayNum).value.trim();({error}=await db.from('days').insert({day_number:dayNum,question:q||'',is_open:openState}));}
  if(error){toast('Failed: '+error.message,'error');return;}
  toast('Day '+dayNum+(openState?' is now OPEN':' is now CLOSED'),'success');
  await loadAll();
}
function switchTab(name,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-submissions').style.display=name==='submissions'?'block':'none';
  document.getElementById('tab-students').style.display=name==='students'?'block':'none';
  document.getElementById('tab-days').style.display=name==='days'?'block':'none';
}
function downloadCSV() {
  const day=document.getElementById('filterDay').value;
  const name=document.getElementById('filterStudent').value.toLowerCase().trim();
  let data=allSubmissions;
  if(day) data=data.filter(s=>s.day_number==day);
  if(name) data=data.filter(s=>s.student_name.toLowerCase().includes(name));
  const headers=['Student Name','Day','Answer','Submitted At'];
  const rows=data.map(s=>[`"${s.student_name}"`,`"Day ${s.day_number}"`,`"${(s.answer||'').replace(/"/g,'""')}"`,`"${new Date(s.submitted_at).toLocaleString('en-NG')}"`]);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`elite-submissions-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+type;
  setTimeout(()=>{el.className='toast';},3000);
}
</script>
</body>
</html>
